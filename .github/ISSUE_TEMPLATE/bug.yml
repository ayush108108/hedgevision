name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug] "
labels: ["bug"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please fill out the form below.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clear description of the bug
      placeholder: "When I do X, Y happens instead of Z..."
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Exact steps to reproduce the bug
      placeholder: |
        1. Clone the repo
        2. Run `pytest tests/test_analytics_service_unit.py`
        3. See error...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should happen
      placeholder: "The test should pass..."
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: "OS, Python version, Node version (if applicable)"
      placeholder: "Linux, Python 3.10, Node 18"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or Error Output
      description: Paste relevant error messages or logs
      render: shell
