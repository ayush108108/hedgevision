[pytest]
# Test configuration for HedgeVision API - REAL TESTING with Supabase

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for test categorization
markers =
    unit: Unit tests for individual components
    integration: Integration tests across multiple components
    real_integration: Real integration tests with Supabase
    real_api: API tests with real Supabase data
    real_business: Business engine tests with real data
    performance: Performance and load tests
    slow: Slow tests that take significant time
    auth: Authentication and authorization tests
    api: API endpoint tests
    cache: Cache-related tests
    screener: Screener functionality tests
    backtest: Backtesting tests
    correlation: Correlation analysis tests
    database: Tests requiring database connection
    supabase: Tests requiring Supabase connection
    
# Output options
# Note: Remove --cov-fail-under for real testing to allow incremental coverage improvement
addopts = 
    -v
    -p no:benchmark
    --tb=short
    --strict-markers
    --strict-config
    --color=yes
    --durations=10
    --cov=hedgevision
    --cov-fail-under=25
    --cov-report=html:htmlcov
    --cov-report=term-missing
    --cov-report=xml
    --cov-report=json:coverage.json

# Minimum version
minversion = 6.0

# Test timeouts (requires pytest-timeout; disabled by default)

# Filtering
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::pytest.PytestCollectionWarning
    
# Async support
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Log configuration
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# File watching

# Custom test order (optional): configure with plugins or marks as needed
