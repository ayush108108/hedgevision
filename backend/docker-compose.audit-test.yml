version: '3.8'

services:
  audit-test:
    build:
      context: .
      dockerfile: Dockerfile.audit-test
    container_name: hedgevision-audit-test
    environment:
      # Pass through all AI audit environment variables
      - AI_AUDIT_ENABLED=${AI_AUDIT_ENABLED:-true}
      - AI_AUDIT_PRIMARY_PROVIDER=${AI_AUDIT_PRIMARY_PROVIDER:-openai}
      - AI_AUDIT_FALLBACK_PROVIDER=${AI_AUDIT_FALLBACK_PROVIDER:-perplexity}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4-turbo-preview}
      - OPENAI_MAX_TOKENS=${OPENAI_MAX_TOKENS:-128000}
      - OPENAI_TEMPERATURE=${OPENAI_TEMPERATURE:-0.1}
      - PERPLEXITY_API_KEY=${PERPLEXITY_API_KEY}
      - PERPLEXITY_MODEL=${PERPLEXITY_MODEL:-llama-3.1-sonar-huge-128k-online}
      - PERPLEXITY_MAX_TOKENS=${PERPLEXITY_MAX_TOKENS:-127000}
      - PERPLEXITY_TEMPERATURE=${PERPLEXITY_TEMPERATURE:-0.1}
      - AI_AUDIT_MAX_CONTEXT_SIZE=${AI_AUDIT_MAX_CONTEXT_SIZE:-250000}
      - AI_AUDIT_DATA_SAMPLING_RATE=${AI_AUDIT_DATA_SAMPLING_RATE:-0.15}
    volumes:
      - ./api/.env:/app/api/.env:ro
    networks:
      - audit-test-network

networks:
  audit-test-network:
    driver: bridge
